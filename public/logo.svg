  <!-- Ball holes -->
  <ellipse cx="300" cy="170" rx="10" ry="18" fill="#0B0B0B"/>
  <ellipse cx="335" cy="155" rx="10" ry="18" fill="#0B0B0B"/>
  <ellipse cx="350" cy="185" rx="10" ry="18" fill="#0B0B0B"/>
  <ellipse cx="315" cy="210" rx="10" ry="18" fill="#0B0B0B"/>

  <!-- Text -->
  <text x="256" y="430"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="90"
        font-weight="700"
